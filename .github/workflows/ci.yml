name: CI

on:
  push:
    branches: [main, 'release/**']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.10'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Agent unit tests
        run: pnpm test:agent

      - name: Web build smoke (linux only)
        if: runner.os == 'Linux'
        run: pnpm --filter @sessions-ai/web build
        env:
          NEXT_TELEMETRY_DISABLED: '1'
