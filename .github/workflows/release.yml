name: Release

# Trigger by pushing a semver tag. Recommended flow:
#   git switch -c release/v0.1.0
#   git push -u origin release/v0.1.0
#   git tag v0.1.0
#   git push origin v0.1.0

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

permissions:
  contents: write
  packages: write
  id-token: write   # for npm provenance

jobs:
  # ------------------------------------------------------------------
  # 1. Cross-platform tests must pass before anything is published
  # ------------------------------------------------------------------
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.0'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Agent unit tests
        run: pnpm test:agent

      # Build the publishable npm bundle and exercise the CLI to confirm
      # `sessions-ai` works on this OS without actually installing a
      # system service (use `service print` for a dry-run preview).
      - name: Build publish-pkg
        run: pnpm --filter agent publish:prepare

      - name: Smoke - sessions-ai --version
        working-directory: apps/agent/publish-pkg
        run: bun bin/sessions-ai.js --version

      - name: Smoke - sessions-ai service print (install dry-run)
        working-directory: apps/agent/publish-pkg
        run: bun bin/sessions-ai.js service print

      - name: Smoke - sessions-ai config path
        working-directory: apps/agent/publish-pkg
        run: bun bin/sessions-ai.js config path

  # ------------------------------------------------------------------
  # 2. Publish npm package `sessions-ai`
  # ------------------------------------------------------------------
  publish-npm:
    name: Publish npm
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.0'

      - name: Resolve version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync agent package version with tag
        run: |
          node -e "const fs=require('fs');const p='apps/agent/package.json';const j=JSON.parse(fs.readFileSync(p));j.version='${{ steps.ver.outputs.version }}';fs.writeFileSync(p,JSON.stringify(j,null,2)+'\n');"

      - name: Build publish-pkg
        run: pnpm --filter agent publish:prepare

      - name: Publish to npm
        working-directory: apps/agent/publish-pkg
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ------------------------------------------------------------------
  # 3. Publish multi-arch Docker image to Docker Hub + GHCR
  # ------------------------------------------------------------------
  publish-docker:
    name: Publish Docker image
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          {
            echo "tags<<EOF"
            echo "${{ secrets.DOCKERHUB_USERNAME }}/sessions-ai-web:${{ steps.ver.outputs.version }}"
            echo "${{ secrets.DOCKERHUB_USERNAME }}/sessions-ai-web:latest"
            echo "ghcr.io/${OWNER_LC}/sessions-ai-web:${{ steps.ver.outputs.version }}"
            echo "ghcr.io/${OWNER_LC}/sessions-ai-web:latest"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  # ------------------------------------------------------------------
  # 4. Create a GitHub Release once npm + Docker are published
  # ------------------------------------------------------------------
  github-release:
    name: GitHub Release
    needs: [publish-npm, publish-docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES="### Artifacts

          - npm: \`npm i -g sessions-ai@${VERSION}\`
          - Docker Hub: \`docker pull ${{ secrets.DOCKERHUB_USERNAME }}/sessions-ai-web:${VERSION}\`
          - GHCR: \`docker pull ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/sessions-ai-web:${VERSION}\`
          "
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes "${NOTES}" \
            --verify-tag
